<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

    <title>Contato</title>
</head>

<body>

    <!-- NAVBAR reutilizada em todas páginas -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <a class="navbar-brand" href="index.html">
            <i class="fas fa-atom"></i> Newton Fã Clube
        </a>

        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ml-auto">
                <li class="nav-item">
                    <a class="nav-link" href="index.html">Início</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="descobertas.html">Descobertas</a>
                </li>
                <li class="nav-item active">
                    <a class="nav-link" href="contato.html">Contato</a>
                </li>
            </ul>
        </div>
    </nav>

    <div class="container mt-5">
        <h2 class="text-center">Entre para o Fã Clube</h2>
        <p class="text-center">
            Preencha o formulário abaixo.
        </p>
        <!-- FORMULÁRIO BOOTSTRAP -->
        <form>
            <div class="form-group">
                <label>Nome</label>
                <input type="text" class="form-control" placeholder="Digite seu nome">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" class="form-control" placeholder="Digite seu email">
            </div>
            <div class="form-group">
                <label>Por que você admira Isaac Newton?</label>
                <textarea class="form-control" rows="4"></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Enviar</button>
            <button type="reset" class="btn btn-secondary">Limpar</button>
        </form>
    </div>

    <footer class="footer fixed-bottom py-2 bg-dark text-white text-center">
        Fã Clube Isaac Newton - Projeto Acadêmico ADS
    </footer>

</body>

</html>
