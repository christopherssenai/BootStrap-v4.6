<!doctype html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
    <link rel="stylesheet" href="https://fontawesome.com/">
    <link rel="stylesheet" href="animate.min.css" >
    <title>Bootstrap</title>
  </head>
  <body>
    <h3>Exemplos comuns:</h3>
    <br><br>
    <!-- Botão cor azul -->
    <button class="btn btn-primary">Botão</button>
    <!-- Botão cor amarelo -->
    <button class="btn btn-warning">Botão</button>
    <!-- Botão hiperlink -->
    <button class="btn btn-link">Botão</button>
    <br>

    <!-- "Botão" <a> -->
    <a class="btn btn-primary" href="#">Nosso Link </a>
    <!-- Botão transparente -->
    <button class="btn btn-outline-primary"> botão </button>
    <!-- Botão grande -->
    <button class="btn btn-primary btn-lg"> botão </button>
    <br><br>

    <!-- Botão cobrindo a tela toda -->
    <button class="btn btn-primary btn-block"> botão </button>
    <br>

    <!-- Botão Dropdown -->
    <div class="dropdown">
      <button class="btn btn-primary" data-togle="dropdown">
        Menu desdobrável
      </button>
      <div class="dropdown-menu">
        <a href="#" class="dropdown-item"> Item Um </a>
        <a href="#" class="dropdown-item"> Item Dois </a>
        <a href="#" class="dropdown-item"> Item três </a>
      </div>
    </div>
    <br>

    <!-- Grupo de botões -->
      <div class="btn-group">
        <button class="btn btn-primary"> Um </button>
        <button class="btn btn-primary"> Dois </button>
        <button class="btn btn-primary"> Três </button>
      </div>    
      <br><br><br><br><br>

      <h3>Exemplos usando fontawesome</h3>
      <br><br>

      <!-- Botão com icone -->
      <button class="btn btn-primary">
        <i class="fa fa-user"></i>
        Botão
      </button>
      <br><br>

    <!-- Lista horizontal -->
      <ul class="list-group list-group-sm">
        <li class="list-group-item">Cras justo odio</li>
        <li class="list-group-item">Dapibus ac facilisis in</li>
        <li class="list-group-item">Morbi leo risus</li>
      </ul>
      <br>
      
      <!-- Botão com numero -->
      <button type="button" class="btn btn-primary">
        Profile <span class="badge badge-light">67</span>
        <span class="sr-only">unread messages</span>
      </button>
      <br>
      
      <!-- muitos botoes  -->
      <span class="badge badge-pill badge-primary">Primary</span><br>
      <span class="badge badge-pill badge-secondary">Secondary</span><br>
      <span class="badge badge-pill badge-success">Success</span><br>
      <span class="badge badge-pill badge-danger">Danger</span><br>
      <span class="badge badge-warning">Warning</span><br>
      <span class="badge badge-info">Info</span><br>
      <span class="badge badge-light">Light</span><br>
      <span class="badge badge-dark">Dark</span><br>
      <br><br><br><br><br>

      <h3>Usando CDN animate.css para criar animações de objetos</h3>
      <br><br>

      
    <!-- Option 1: jQuery and Bootstrap Bundle (includes Popper) -->
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-Fy6S3B9q64WdZWQUiU+q4/2Lc9npb8tCaSX9FK7E8HnRr0Jz8D6OP9dO5Vg3Q9ct" crossorigin="anonymous"></script>
    <script src="https://kit.fontawesome.com/e9591b0830.js" crossorigin="anonymous"></script>
    <!-- Option 2: Separate Popper and Bootstrap JS -->

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js" integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.min.js" integrity="sha384-+sLIOodYLS7CIrQpBjl+C7nPvqq+FbNUBDunl/OZv93DB7Ln/533i8e/mZXLi/P+" crossorigin="anonymous"></script>
    -->
  </body>
</html>
